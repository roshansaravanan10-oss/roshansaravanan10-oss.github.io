<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- FwdDeploy brand mark: terminal >_ in a corner-crop viewfinder, on the
       brand dark-navy ground so it reads as a tab favicon. White strokes,
       orange cursor spark (the brand accent). -->
  <rect width="100" height="100" rx="22" fill="#071e36"/>
  <g stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- four corner crop marks (a hint of the viewfinder frame) -->
    <g stroke-width="5">
      <path d="M24 38V24H38"/>
      <path d="M62 24H76V38"/>
      <path d="M24 62V76H38"/>
      <path d="M76 62V76H62"/>
    </g>
    <!-- `>` prompt -->
    <path d="M38 40L52 50L38 60" stroke-width="6.5"/>
  </g>
  <!-- `_` cursor — the orange spark -->
  <path d="M58 60H72" stroke="#e8702a" stroke-width="6.5" stroke-linecap="round"/>
</svg>
